  /auth/v1/otp:
    post:
      summary: Sign In with WhatsApp (OTP)
      description: |
        Initiates the login flow by sending an OTP via WhatsApp. Native Supabase Auth endpoint documented here for reference.
      servers:
        - url: https://yfgciamhzjvarwgzosto.supabase.co
          description: Supabase Auth Server
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: '+5511999999999'
                channel:
                  type: string
                  default: whatsapp
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                type: object
  /auth/v1/verify:
    post:
      summary: Verify OTP
      description: |
        Verifies the OTP sent to the user. Native Supabase Auth endpoint documented here for reference.
      servers:
        - url: https://yfgciamhzjvarwgzosto.supabase.co
          description: Supabase Auth Server
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
                - token
                - type
              properties:
                phone:
                  type: string
                  example: '+5511999999999'
                token:
                  type: string
                  example: '123456'
                type:
                  type: string
                  default: sms
      responses:
        '200':
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  session:
                    type: object
                  user:
                    type: object
