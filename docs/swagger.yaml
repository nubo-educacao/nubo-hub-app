openapi: 3.0.0
info:
  title: Nubo Hub App Supabase API
  version: 1.0.0
  description: |
    Documentation of the Supabase tables, views, and RPCs used by the Nubo Hub Web App (nubo-hub-app). These resources are consumed by the frontend (Next.js) via supabase-js.
servers:
  - url: https://yfgciamhzjvarwgzosto.supabase.co/rest/v1
    description: Supabase REST API Endpoint
components:
  securitySchemes:
    apikey:
      type: apiKey
      name: apikey
      in: header
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
    CourseDisplayData:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_name:
          type: string
        institution_name:
          type: string
        city:
          type: string
        state:
          type: string
        opportunities:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              shift:
                type: string
              scholarship_type:
                type: string
              opportunity_type:
                type: string
              cutoff_score:
                type: number
                format: float
    OpportunityView:
      type: object
      description: Read-only view. Matches database.types.ts OpportunityRow + join fields
      properties:
        id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        course:
          type: string
        institution:
          type: string
        city:
          type: string
        state:
          type: string
        shift:
          type: string
        scholarship_type:
          type: string
        cutoff_score:
          type: number
          format: float
        opportunity_type:
          type: string
    RPCCoursesResponse:
      type: array
      items:
        $ref: '#/components/schemas/CourseDisplayData'
    CourseDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        course_name:
          type: string
        course_code:
          type: string
        vacancies:
          type: integer
        opportunities:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              semester:
                type: string
              shift:
                type: string
              scholarship_type:
                type: string
              cutoff_score:
                type: number
        campus:
          type: object
          properties:
            name:
              type: string
            city:
              type: string
            state:
              type: string
            region:
              type: string
            institutions:
              type: object
              properties:
                id:
                  type: string
                  format: uuid
                name:
                  type: string
                external_code:
                  type: string
                institutionsinfoemec:
                  type: array
                  items:
                    type: object
                    properties:
                      phone:
                        type: string
                      site:
                        type: string
                      email:
                        type: string
                      academic_organization:
                        type: string
                      credentialing_type:
                        type: string
                      administrative_category:
                        type: string
                      creation_date:
                        type: string
                      ci:
                        type: integer
                      ci_ead:
                        type: integer
                      igc:
                        type: integer
                institutionsinfosisu:
                  type: array
                  items:
                    type: object
                    properties:
                      acronym:
                        type: string
    Partner:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        location:
          type: string
        type:
          type: string
        income:
          type: string
        dates:
          type: object
        link:
          type: string
        coverimage:
          type: string
security:
  - apikey: []
  - bearerAuth: []
paths:
  /rpc/get_courses_with_opportunities:
    post:
      summary: get_courses_with_opportunities
      description: Calls the get_courses_with_opportunities RPC function
      operationId: get_courses_with_opportunities
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                page_number:
                  type: integer
                page_size:
                  type: integer
                search_query:
                  type: string
                category:
                  type: string
                sort_by:
                  type: string
                user_city:
                  type: string
                user_state:
                  type: string
                user_lat:
                  type: number
                user_long:
                  type: number
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: string
  /opportunities_view:
    get:
      summary: Get Opportunities by Course IDs
      description: |
        Used by `fetchOpportunitiesByCourseIds`.  Fetches detailed opportunity info for a specific list of courses.
      parameters:
        - name: course_id
          in: query
          description: Filter by list of Course IDs (in)
          schema:
            type: string
            example: in.(uuid1,uuid2)
        - name: select
          in: query
          description: Columns to select
          schema:
            type: string
            default: '*'
      responses:
        '200':
          description: List of opportunities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OpportunityView'
  /courses:
    get:
      summary: Get Course Details
      description: |
        Fetches detailed information for a specific course, including nested relations: opportunities, campus (with institution), and institution details (EMEC, SISU). Used by `getCourseDetails`.
      parameters:
        - name: id
          in: query
          required: true
          description: Course ID (eq.UUID)
          schema:
            type: string
            format: uuid
        - name: select
          in: query
          description: PostgREST select query with nested embeddings
          schema:
            type: string
      responses:
        '200':
          description: Course details object
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CourseDetail'
  /rpc/get_partners:
    post:
      summary: get_partners
      description: Calls the get_partners RPC function
      operationId: get_partners
      requestBody:
